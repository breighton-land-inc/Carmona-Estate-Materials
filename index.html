<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="bgAndLogo/carmona-removebg-preview.png">
    <title>Oakwood File Portal | Carmona Estates</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-group">
                <img src="bgAndLogo/carmona-removebg-preview.png" alt="Logo" class="logo-img">
                <span class="logo-separator">|</span>
                <h3 class="logo-text">Oakwood</h3>
            </div>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <div class="nav-right">
               <a href="#hero" class="nav-btn">Home</a>
               <a href="#files" class="nav-btn">Files</a>
               <a href="#floorplan" class="nav-btn">Floor Plans</a>
            </div>
        </div>
    </nav>

    <main class="content">
        <section id="hero" class="hero">
            <div class="hero-banner">
                <img src="bgAndLogo/CE Banner Image.png" alt="Carmona Estates Banner" class="banner-img">
            </div>
            <div class="hero-content"></div>
        </section>

        <section id="files" class="files-section">
            <h2 class="section-title">Available Documents</h2>
            <div id="file-list" class="file-grid"></div>
        </section>

        <section id="floorplan" class="floorplan-section">
            <h2 class="section-title">Floor Plans</h2>
            <div class="floorplan-grid">
                <div class="floorplan-item" data-img="./floorplan/floorplan1.jpg">
                    <img src="./floorplan/floorplan1.jpg" alt="Floorplan 1" class="floorplan-img">
                    <div class="floorplan-overlay">
                        <button class="view-btn">View Floorplan</button>
                    </div>
                </div>
                <div class="floorplan-item" data-img="./floorplan/floorplan2.jpg">
                    <img src="./floorplan/floorplan2.jpg" alt="Floorplan 2" class="floorplan-img">
                    <div class="floorplan-overlay">
                        <button class="view-btn">View Floorplan</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="floorplanModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modalImg" class="modal-img" src="" alt="Floorplan">
            <div class="modal-nav">
                <button id="modalPrev" class="modal-btn">❮</button>
                <span id="modalCounter">1 / 2</span>
                <button id="modalNext" class="modal-btn">❯</button>
            </div>
        </div>
    </div>

    <div id="fileModal" class="modal">
        <div class="modal-content" style="height: 85vh; max-width: 900px; padding: 20px;">
            <span class="close" id="fileClose">&times;</span>
            <iframe id="fileViewer" src="" style="width: 100%; height: 100%; border: none; border-radius: 10px; background: white;"></iframe>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Breighton Land Inc. Carmona Estates Materials Portal.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
